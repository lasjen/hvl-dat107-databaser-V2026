version: '3.8'

services:
  dat107-postgres:
    image: postgres:15-alpine
    container_name: dat107-postgres
    environment:
      POSTGRES_DB: dat107_db
      POSTGRES_USER: dat107_user
      POSTGRES_PASSWORD: dat107_password
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dat107_user -d dat107_db"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

