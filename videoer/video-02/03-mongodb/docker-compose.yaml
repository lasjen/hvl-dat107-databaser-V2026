version: '3.8'

services:
  mongodb:
    build: .
    container_name: dat107-mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./mongodb-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=dat107_db
    restart: unless-stopped
    networks:
      - dat107-network

networks:
  dat107-network:
    driver: bridge

volumes:
  mongodb-data: